name: Deploy to WordPress.org

# نشر Data Hygiene إلى WP.org SVN — device-off، الاعتمادات في GitHub Secrets (بند 17).
# يُشغَّل بدفع git tag (مثل 1.0.0) => الأكشن يأخذ الإصدار من التاج. VERSION مثبّت احتياطياً.

on:
  push:
    tags: ['*']
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy to WordPress.org SVN
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: data-hygiene-for-woocommerce
          VERSION: "1.1.0"
